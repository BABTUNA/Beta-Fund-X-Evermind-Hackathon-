<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EverNav</title>
  <style>
    :root {
      --cream:    #F1EFE9;
      --paper:    #FAF8F2;
      --ink:      #0F1419;
      --ink-soft: #2A2E33;
      --muted:    #6B6F76;
      --border:   #E0DBD0;
      --neon:     #FF2D8B;
      --neon-deep:#A6005C;
    }
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      padding: 18px 18px 16px;
      background: var(--cream);
      color: var(--ink);
      font: 13px/1.5 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.1px;
    }
    .brand .dot {
      width: 8px;
      height: 8px;
      background: var(--neon);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255, 45, 139, 0.18);
    }
    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 999px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .user-row .label { color: var(--muted); }
    .user-badge {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--ink);
      font-weight: 600;
      margin-left: 6px;
    }
    .user-switch {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .user-switch:hover {
      color: var(--ink);
      background: var(--cream);
    }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 14px;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 12px;
      font: 13px/1.5 'Inter', -apple-system, sans-serif;
      resize: vertical;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus {
      outline: none;
      border-color: var(--ink);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    button.primary {
      flex: 1;
      padding: 11px 14px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: -0.1px;
    }
    button.primary:hover { background: var(--ink-soft); }
    button.primary:disabled { opacity: 0.5; cursor: wait; }
    button.secondary {
      width: 38px;
      padding: 0;
      background: var(--paper);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary:hover {
      color: var(--ink);
      border-color: var(--ink);
    }
    .status {
      margin-top: 12px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 38px;
      line-height: 1.4;
    }
    .status.hit {
      color: var(--neon-deep);
      border-color: var(--neon);
      background: #F4F2EC;
    }
    .status.err {
      color: #8C2D2D;
      border-color: #C57272;
      background: #F8EAEA;
    }
    a.options {
      display: block;
      margin-top: 10px;
      text-align: right;
      color: var(--muted);
      font-size: 11px;
      text-decoration: none;
    }
    a.options:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="head">
    <div class="brand"><span class="dot"></span>EverNav</div>
  </div>

  <div class="user-row">
    <span><span class="label">Active</span><span class="user-badge" id="userBadge">demo_user_1</span></span>
    <button class="user-switch" id="switchUser">switch</button>
  </div>

  <textarea
    id="task"
    placeholder="What do you want to do? e.g. rotate my personal access token"
    autofocus
  ></textarea>

  <div class="actions">
    <button class="primary" id="go">Guide me</button>
    <button class="secondary" id="stop" title="Stop guidance">×</button>
  </div>

  <div class="status" id="status">Ready.</div>

  <a class="options" href="#" id="openOptions">API keys →</a>

  <script src="popup.js"></script>
</body>
</html>
