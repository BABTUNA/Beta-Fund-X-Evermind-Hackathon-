<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EverNav</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #00ff88;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    h1 .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .user-badge {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--accent);
    }
    .user-switch {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .user-switch:hover { color: var(--text); }
    textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    button.primary {
      flex: 1;
      padding: 8px 12px;
      background: var(--accent);
      color: #001a0e;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover { filter: brightness(1.1); }
    button.primary:disabled { opacity: 0.5; cursor: wait; }
    button.secondary {
      padding: 8px 10px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      font-size: 11px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 32px;
    }
    .status.hit { color: var(--accent); border-color: var(--accent); }
    .status.err { color: #ff6b6b; border-color: #ff6b6b; }
    a.options {
      display: block;
      margin-top: 8px;
      text-align: right;
      color: var(--muted);
      font-size: 10px;
      text-decoration: none;
    }
    a.options:hover { color: var(--text); }
  </style>
</head>
<body>
  <h1><span class="dot"></span>EverNav</h1>

  <div class="user-row">
    <span>Active user: <span class="user-badge" id="userBadge">demo_user_1</span></span>
    <button class="user-switch" id="switchUser">switch</button>
  </div>

  <textarea
    id="task"
    placeholder="What do you want to do? e.g. rotate my personal access token"
    autofocus
  ></textarea>

  <div class="actions">
    <button class="primary" id="go">Guide me</button>
    <button class="secondary" id="stop" title="Stop guidance">×</button>
  </div>

  <div class="status" id="status">Ready.</div>

  <a class="options" href="#" id="openOptions">⚙ API keys</a>

  <script src="popup.js"></script>
</body>
</html>
